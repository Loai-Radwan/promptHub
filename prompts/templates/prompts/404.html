{% extends "prompts/layout.html" %}

{% block title %}404 - Page Not Found{% endblock %}



{% block main %}

<div class="row justify-content-center align-items-center" style="min-height:70vh;">

    <div class="col-lg-7 text-center">

        <div class="mb-4">
            <i class="bi bi-exclamation-octagon display-1 text-danger"></i>
        </div>

        <h1 class="display-1 fw-bold">404</h1>

        <h2 class="fw-bold mb-3">
            Page Not Found
        </h2>

        <p class="lead text-muted mb-4">
            {{message|default:"Sorry, the page you're looking for doesn't exist or may have been moved."}}
        </p>

        <div class="d-flex justify-content-center gap-3 flex-wrap">

            <a href="{% url 'index' %}" class="btn btn-primary btn-lg">
                <i class="bi bi-house-door me-2"></i>
                Back to Home
            </a>

            <button onclick="history.back()" class="btn btn-outline-secondary btn-lg">
                <i class="bi bi-arrow-left me-2"></i>
                Go Back
            </button>

        </div>

    </div>

</div>

{% endblock %}
