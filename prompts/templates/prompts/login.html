{% extends "prompts/layout.html" %}

{% block title %}Login {% endblock %}

<!-- {% block header %}{% endblock %} -->

{% block main %}

<div class="row justify-content-center align-items-center" style="min-height: 70vh;">

    <div class="col-12 col-md-6 col-lg-4">

        <div class="card shadow-sm border-0 rounded-4">

            <div class="card-body p-4">

                <!-- Title -->
                <div class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right fs-1 text-primary"></i>
                    <h3 class="fw-bold mt-2">Welcome back</h3>
                    <p class="text-muted mb-0">Login to your PromptHub account</p>
                </div>

                <!-- Form -->
                <form method="post">

                    {% csrf_token %}

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Email or Username</label>
                        <input type="text" name="username" class="form-control form-control-lg" placeholder="you@example.com" required value="{{ form_content.username }}">
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required value="{{ form_content.password }}">
                    </div>


                    <!-- Submit -->
                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        Login
                    </button>

                </form>

                <!-- Divider -->
                <!-- <div class="text-center my-3 text-muted">
                    <small>OR</small>
                </div> -->

                <!-- Social Login (optional UI only) -->
                <!-- <button class="btn btn-outline-dark w-100 mb-2">
                    <i class="bi bi-google me-2"></i> Continue with Google
                </button>

                <button class="btn btn-outline-secondary w-100">
                    <i class="bi bi-github me-2"></i> Continue with GitHub
                </button> -->

                <!-- Register link -->
                <p class="text-center mt-4 mb-0">
                    Don't have an account?
                    <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">
                        Sign up
                    </a>
                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
